services:
  init_dirs:
    image: alpine:3.20
    container_name: media-init-dirs
    volumes:
      - ./config:/workspace/config
      - ./media:/workspace/media
      - ./backups:/workspace/backups
    command: >
      /bin/sh -ec "
      mkdir -p \
        /workspace/config/sabnzbd \
        /workspace/config/sonarr \
        /workspace/config/radarr \
        /workspace/config/ombi \
        /workspace/media/downloads/incomplete \
        /workspace/media/downloads/complete \
        /workspace/media/movies \
        /workspace/media/tv \
        /workspace/backups;
      echo 'init: required folders are ready';
      "
    restart: "no"

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ:-America/New_York}
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - FIREWALL=on
      - FIREWALL_INPUT_PORTS=${FIREWALL_INPUT_PORTS:-8080,8989,7878,3579}
      - FIREWALL_OUTBOUND_SUBNETS=
      # Optional: set this for provider-specific DNS if needed.
      # - DOT=off
    volumes:
      - ${VPN_WG_CONF:-./nl-ams-wg-005.conf}:/gluetun/wireguard/wg0.conf:ro
      - gluetun-state:/tmp/gluetun
    ports:
      - "8080:8080"
      - "8989:8989"
      - "7878:7878"
      - "3579:3579"
    depends_on:
      init_dirs:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - media-net

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/sabnzbd:/config
      - ./media:/media
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/sonarr:/config
      - ./media:/media
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
      sabnzbd:
        condition: service_started
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/radarr:/config
      - ./media:/media
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
      sabnzbd:
        condition: service_started
    restart: unless-stopped

  ombi:
    image: lscr.io/linuxserver/ombi:latest
    container_name: ombi
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/ombi:/config
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  backup:
    image: alpine:3.20
    container_name: media-backup
    environment:
      - TZ=${TZ:-America/New_York}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - RETENTION_DAYS=${RETENTION_DAYS:-14}
    volumes:
      - ./config:/data/config:ro
      - ./media:/data/media:ro
      - ./backups:/backups
    command: >
      /bin/sh -c "
      set -eu;
      apk add --no-cache tzdata;
      while true; do
        ts=$$(date +%Y%m%d-%H%M%S);
        dest=/backups/media-backup-$$ts.tar.gz;
        tar -czf $$dest -C /data config media;
        find /backups -type f -name 'media-backup-*.tar.gz' -mtime +$${RETENTION_DAYS} -delete;
        sleep $$(($${BACKUP_INTERVAL_HOURS} * 3600));
      done
      "
    depends_on:
      init_dirs:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - media-net

  dashboard:
    build:
      context: ./dashboard_app
    container_name: media-dashboard
    environment:
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8081}
      - RADARR_HOST=${RADARR_HOST:-gluetun}
      - SONARR_HOST=${SONARR_HOST:-gluetun}
      - SABNZBD_HOST=${SABNZBD_HOST:-gluetun}
      - OMBI_HOST=${OMBI_HOST:-gluetun}
      - GLUETUN_IP_FILE=${GLUETUN_IP_FILE:-/gluetun_state/ip}
      - MEDIA_ROOT_DIR=${MEDIA_ROOT_DIR:-/media}
      # Recommended: your regular ISP public IP with VPN disconnected.
      - HOME_PUBLIC_IP=${HOME_PUBLIC_IP:-}
      # Recommended for dynamic IP home connections: match VPN provider/org text.
      # Example values: kaspersky,vpn,m247,datacamp
      - VPN_ORG_KEYWORDS=${VPN_ORG_KEYWORDS:-}
      - VPN_EXPECTED_IP=${VPN_EXPECTED_IP:-}
      # Optional: comma-separated list for multiple valid VPN egress IPs.
      - VPN_EXPECTED_IPS=${VPN_EXPECTED_IPS:-}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config:/config:ro
      - ./media/downloads:/downloads
      - ./media:/media
      - gluetun-state:/gluetun_state:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${DASHBOARD_PUBLIC_PORT:-8090}:${DASHBOARD_PORT:-8081}"
    depends_on:
      init_dirs:
        condition: service_completed_successfully
      sabnzbd:
        condition: service_started
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
      ombi:
        condition: service_started
    restart: unless-stopped
    networks:
      - media-net

  vpn_guard:
    image: docker:27-cli
    container_name: vpn-guard
    environment:
      - GLUETUN_CONTAINER=gluetun
      - TARGET_CONTAINERS=sabnzbd sonarr radarr ombi media-dashboard media-backup
      - CHECK_INTERVAL_SECONDS=${VPN_GUARD_CHECK_INTERVAL_SECONDS:-5}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      /bin/sh -ec "
      echo 'vpn-guard started: monitoring' $$GLUETUN_CONTAINER;
      while true; do
        running=$$(docker inspect --format '{{.State.Running}}' $$GLUETUN_CONTAINER 2>/dev/null || echo false);
        health=$$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' $$GLUETUN_CONTAINER 2>/dev/null || echo missing);
        if [ \"$$running\" != \"true\" ] || { [ \"$$health\" != \"none\" ] && [ \"$$health\" != \"healthy\" ]; }; then
          echo 'vpn-guard trigger: gluetun running='$$running' health='$$health' -> stopping targets';
          for c in $$TARGET_CONTAINERS; do
            docker stop -t 10 $$c >/dev/null 2>&1 || true;
          done;
        fi;
        sleep $$CHECK_INTERVAL_SECONDS;
      done
      "
    depends_on:
      - gluetun
    restart: unless-stopped
    networks:
      - media-net

networks:
  media-net:
    driver: bridge

volumes:
  gluetun-state:
